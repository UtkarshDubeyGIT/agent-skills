name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - package.json
      - bin/**
      - AGENTS.md
      - CLAUDE.md
      - skills/**
      - UI/**

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Validate package
        run: npm pack --dry-run 2>&1 | head -5

      - name: Check if version already published
        id: check
        run: |
          PUBLISHED=$(npm view ${{ github.event.repository.name }} version 2>/dev/null || echo "none")
          LOCAL=$(node -p "require('./package.json').version")
          if [ "$PUBLISHED" = "$LOCAL" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version $LOCAL already published — skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "New version $LOCAL — publishing"
          fi

      - name: Publish to npm
        if: steps.check.outputs.skip != 'true'
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
