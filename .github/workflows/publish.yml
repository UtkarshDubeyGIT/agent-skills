name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - package.json
      - bin/**
      - AGENTS.md
      - CLAUDE.md
      - skills/**
      - UI/**

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Validate package
        run: npm pack --dry-run 2>&1 | head -5

      - name: Check if version already published
        id: check
        run: |
          PUBLISHED=$(npm view ${{ github.event.repository.name }} version 2>/dev/null || echo "none")
          LOCAL=$(node -p "require('./package.json').version")
          if [ "$PUBLISHED" = "$LOCAL" ]; then
            echo "bump=true" >> "$GITHUB_OUTPUT"
            echo "Version $LOCAL already published — bumping patch"
          else
            echo "bump=false" >> "$GITHUB_OUTPUT"
            echo "New version $LOCAL — publishing as-is"
          fi

      - name: Auto-bump version
        if: steps.check.outputs.bump == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          npm version patch --no-git-tag-version
          NEW_VER=$(node -p "require('./package.json').version")
          git add package.json
          git commit -m "Bump to $NEW_VER [skip ci]"
          git push
          echo "Bumped to $NEW_VER"

      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}