name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - package.json
      - .github/workflows/**
      - bin/**
      - AGENTS.md
      - CLAUDE.md
      - skills/**
      - UI/**

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Validate package
        run: npm pack --dry-run 2>&1 | head -5

      - name: Check if version already published
        id: check
        run: |
          PUBLISHED=$(npm view $(node -p "require('./package.json').name") version 2>/dev/null || echo "none")
          LOCAL=$(node -p "require('./package.json').version")
          if [ "$PUBLISHED" = "$LOCAL" ]; then
            echo "bump=true" >> "$GITHUB_OUTPUT"
            echo "Version $LOCAL already published — bumping patch"
          else
            echo "bump=false" >> "$GITHUB_OUTPUT"
            echo "New version $LOCAL — publishing as-is"
          fi

      - name: Auto-bump version
        if: steps.check.outputs.bump == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git remote -v
          echo "=== Git status before bump ==="
          git status
          echo "=== Branch ==="
          git branch --show-current
          echo "=== Remote URL ==="
          git remote get-url origin
          echo "=== Bumping version ==="
          node -e "
            const p = require('./package.json');
            const v = p.version.split('.').map(Number);
            v[2]++;
            p.version = v.join('.');
            require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "
          NEW_VER=$(node -p "require('./package.json').version")
          git add package.json
          git status
          echo "=== Committing ==="
          git commit -m "Bump to $NEW_VER [skip ci]"
          echo "=== Pushing ==="
          git push origin HEAD:main 2>&1
          echo "=== Done, bumped to $NEW_VER ==="

      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}